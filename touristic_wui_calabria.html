<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mappa Interattiva - Calabria</title>

  <!-- Mapbox GL JS -->
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Georgia', serif;
      background: #0d1117;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 10;
      padding: 14px 20px;
      background: linear-gradient(to bottom, rgba(13,17,23,0.95), transparent);
      display: flex;
      align-items: center;
      gap: 16px;
      pointer-events: none;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: normal;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #ffffff;
    }

    header span {
      font-size: 0.75rem;
      color: #888;
      letter-spacing: 0.05em;
    }

    /* ── PANNELLO INFO HOVER ── */
    #info-panel {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: rgba(13, 17, 23, 0.92);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 14px 20px;
      min-width: 260px;
      backdrop-filter: blur(8px);
      text-align: center;
    }

    #info-hint {
      font-size: 0.78rem;
      color: #888;
      letter-spacing: 0.05em;
    }

    #info-nome {
      font-size: 1rem;
      color: #ffffff;
      font-weight: bold;
      margin-bottom: 4px;
    }

    #info-valore {
      font-size: 0.82rem;
      color: #bbb;
    }

    /* ── MAPPA ── */
    #map {
      flex: 1;
      width: 100%;
      height: 100vh;
    }

    /* ── PANNELLO CONTROLLI LAYER ── */
    #layer-panel {
      position: absolute;
      top: 60px;
      right: 16px;
      z-index: 10;
      background: rgba(13, 17, 23, 0.92);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 14px 16px;
      min-width: 200px;
      backdrop-filter: blur(8px);
    }

    #layer-panel h2 {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 12px;
    }

    .layer-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      gap: 10px;
    }

    .layer-toggle label {
      font-size: 0.82rem;
      color: #ccc;
      cursor: pointer;
    }

    /* Toggle switch */
    .switch {
      position: relative;
      display: inline-block;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }

    .switch input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #333;
      border-radius: 20px;
      transition: background 0.3s;
    }

    .slider:before {
      content: '';
      position: absolute;
      height: 14px; width: 14px;
      left: 3px; bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.3s;
    }

    input:checked + .slider { background: #c0392b; }
    input:checked + .slider:before { transform: translateX(16px); }

    /* ── LEGENDA ── */
    #legend {
      position: absolute;
      bottom: 30px;
      left: 16px;
      z-index: 10;
      background: rgba(13, 17, 23, 0.92);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 14px 16px;
      min-width: 180px;
      backdrop-filter: blur(8px);
    }

    #legend h2 {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 10px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 0.78rem;
      color: #bbb;
    }

    .legend-color {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    /* ── TOOLTIP HOVER ── */
    #tooltip {
      position: absolute;
      z-index: 20;
      background: rgba(13,17,23,0.95);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 0.8rem;
      color: #ddd;
      pointer-events: none;
      display: none;
      max-width: 240px;
      line-height: 1.6;
    }


  </style>
</head>
<body>

  <header>
    <h1>Mappa Interattiva</h1>
    <span>Calabria · Wildland-Urban Interface</span>
  </header>

  <!-- Pannello info hover in alto a destra -->
  <div id="info-panel">
    <div id="info-content">
      <div id="info-nome">—</div>
      <div id="info-valore">—</div>
    </div>
  </div>

  <div id="map"></div>
  <div id="tooltip"></div>

  <!-- Pannello layer -->
  <div id="layer-panel">
    <h2>Layer</h2>

    <div class="layer-toggle">
      <label for="toggle-comuni">WUI_DI</label>
      <label class="switch">
        <input type="checkbox" id="toggle-comuni" checked onchange="toggleLayer('comuni-layer', this.checked)">
        <span class="slider"></span>
      </label>
    </div>

    <div class="layer-toggle">
      <label for="toggle-hdi">HDI</label>
      <label class="switch">
        <input type="checkbox" id="toggle-hdi" checked onchange="toggleLayer('hdi-layer', this.checked)">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <!-- Legenda -->
  <div id="legend">
    <h2>WUI area / comune (-)</h2>
    <div class="legend-item">
      <div class="legend-color" style="background:#ffffff;border:1px solid #555;"></div>
      <span>0.0</span>
    </div>
    <div class="legend-item">
      <div class="legend-color" style="background:#fcd5d5;"></div>
      <span>0.00001</span>
    </div>
    <div class="legend-item">
      <div class="legend-color" style="background:#f48a8a;"></div>
      <span>0.0001</span>
    </div>
    <div class="legend-item">
      <div class="legend-color" style="background:#e74c3c;"></div>
      <span>0.001</span>
    </div>
    <div class="legend-item">
      <div class="legend-color" style="background:#922b21;"></div>
      <span>0.01</span>
    </div>
    <div class="legend-item">
      <div class="legend-color" style="background:#1a0000;"></div>
      <span>0.1+</span>
    </div>
  </div>



  <script>
    // ══════════════════════════════════════════════
    // 1. CONFIGURAZIONE
    // ══════════════════════════════════════════════

    // ⚠️ Sostituisci con il tuo token da mapbox.com/account/access-tokens
    mapboxgl.accessToken = 'pk.eyJ1IjoicGllcnBhb2xvMSIsImEiOiJjbW9weG43cG0wczdmMnJxdHgyaTlqZmViIn0.3Cg-OIGgm6p--4SfnPsXxQ';

    // Centro sulla Calabria
    const map = new mapboxgl.Map({
      container: 'map',
      style: 'mapbox://styles/mapbox/dark-v11',  // stile scuro, cambia a piacere
      center: [16.55, 38.90],   // longitudine, latitudine Calabria
      zoom: 7,
      minZoom: 4,
      maxZoom: 18
    });

    // Controlli navigazione (zoom +/-)
    map.addControl(new mapboxgl.NavigationControl(), 'top-left');

    // Scala
    map.addControl(new mapboxgl.ScaleControl({ unit: 'metric' }), 'bottom-left');


    // ══════════════════════════════════════════════
    // 2. CARICAMENTO LAYER QUANDO LA MAPPA È PRONTA
    // ══════════════════════════════════════════════

    map.on('load', () => {

      // ── LAYER COMUNI CALABRIA ─────────────────────────────────────────
      map.addSource('comuni-source', {
        type: 'geojson',
        data: 'https://pierf94.github.io/touristic-wui/Calabria_muni_metric_acc_cartanatura.geojson'
      });

      map.addLayer({
        id: 'comuni-layer',
        type: 'fill',
        source: 'comuni-source',
        paint: {
          'fill-color': [
            'interpolate', ['linear'], ['get', 'WUI_A_rel_visual'],
            0,        '#ffffff',
            0.00001,  '#fcd5d5',
            0.0001,   '#f48a8a',
            0.001,    '#e74c3c',
            0.01,     '#922b21',
            0.114111, '#1a0000'
          ],
          'fill-opacity': 0.75,
          'fill-outline-color': 'rgba(255,255,255,0.15)'
        }
      });

      // ── LAYER HDI ─────────────────────────────────────────────────────
      // Quando hai il file pronto, sostituisci il path qui sotto
      map.addSource('hdi-source', {
        type: 'geojson',
        data: 'https://pierf94.github.io/touristic-wui/hdi.geojson'
      });

      map.addLayer({
        id: 'hdi-layer',
        type: 'fill',
        source: 'hdi-source',
        paint: {
          'fill-color': [
            'interpolate', ['linear'], ['get', 'HDI'],
            0,      '#ffffff',
            0.00001,'#fcd5d5',
            0.0001, '#f48a8a',
            0.001,  '#e74c3c',
            0.01,   '#922b21',
            0.1,    '#1a0000'
          ],
          'fill-opacity': 0.75,
          'fill-outline-color': 'rgba(255,255,255,0.15)'
        }
      });


      const tooltip = document.getElementById('tooltip');

      map.on('mousemove', 'comuni-layer', (e) => {
        const props = e.features[0].properties;
        map.getCanvas().style.cursor = 'pointer';

        const nome = props.LAU_NAME || '';
        const valore = props.WUI_A_rel_visual !== undefined
          ? Number(props.WUI_A_rel_visual).toFixed(6)
          : 'N/D';

        // Tooltip mobile
        tooltip.innerHTML = `<b>${nome}</b><br>WUI / Comune: <b>${valore}</b>`;
        tooltip.style.display = 'block';
        tooltip.style.left = (e.point.x + 14) + 'px';
        tooltip.style.top  = (e.point.y - 10) + 'px';

        // Pannello info fisso
        document.getElementById('info-content').style.display = 'block';
        document.getElementById('info-nome').textContent = nome;
        document.getElementById('info-valore').textContent = 'WUI / Comune: ' + valore;
      });

      map.on('mouseleave', 'comuni-layer', () => {
        map.getCanvas().style.cursor = '';
        tooltip.style.display = 'none';
        document.getElementById('info-nome').textContent = '—';
        document.getElementById('info-valore').textContent = '—';
      });

      // ── TOOLTIP HDI ───────────────────────────────────────────────────
      map.on('mousemove', 'hdi-layer', (e) => {
        const props = e.features[0].properties;
        map.getCanvas().style.cursor = 'pointer';

        const nome = props.LAU_NAME || '';
        const valore = props.HDI !== undefined
          ? Number(props.HDI).toFixed(6)
          : 'N/D';

        tooltip.innerHTML = `<b>${nome}</b><br>HDI: <b>${valore}</b>`;
        tooltip.style.display = 'block';
        tooltip.style.left = (e.point.x + 14) + 'px';
        tooltip.style.top  = (e.point.y - 10) + 'px';

        document.getElementById('info-content').style.display = 'block';
        document.getElementById('info-nome').textContent = nome;
        document.getElementById('info-valore').textContent = 'HDI: ' + valore;
      });

      map.on('mouseleave', 'hdi-layer', () => {
        map.getCanvas().style.cursor = '';
        tooltip.style.display = 'none';
        document.getElementById('info-nome').textContent = '—';
        document.getElementById('info-valore').textContent = '—';
      });

    }); // fine map.on('load')


    // ══════════════════════════════════════════════
    // 3. TOGGLE VISIBILITÀ LAYER
    // ══════════════════════════════════════════════

    function toggleLayer(layerId, visible) {
      if (!map.getLayer(layerId)) return;
      map.setLayoutProperty(layerId, 'visibility', visible ? 'visible' : 'none');
    }




  </script>
</body>
</html>
